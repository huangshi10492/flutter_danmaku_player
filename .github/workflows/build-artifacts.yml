name: Build artifacts

on:
  workflow_call:
    inputs:
      release_tag:
        required: false
        type: string
        default: ""
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: true
      ANDROID_KEYSTORE_PASSWORD:
        required: true
      ANDROID_KEY_PASSWORD:
        required: true
      ANDROID_KEY_ALIAS:
        required: true
      DANDANPLAY_APP_ID:
        required: false
      DANDANPLAY_APP_SECRET:
        required: false

env:
  JAVA_VERSION: "21"
  FLUTTER_VERSION: "3.41.7"
  RELEASE_TAG: ${{ inputs.release_tag }}
  DANDANPLAY_APP_ID: ${{ secrets.DANDANPLAY_APP_ID }}
  DANDANPLAY_APP_SECRET: ${{ secrets.DANDANPLAY_APP_SECRET }}

jobs:
  android-linux:
    name: Build Android and Linux
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        run: bash .github/scripts/resolve-tag.sh

      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev rpm patchelf libmpv-dev

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter (${{ env.FLUTTER_VERSION }})
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Create Android signing config
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/keystore.jks"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          {
            echo "storeFile=$KEYSTORE_PATH"
            echo "storePassword=${ANDROID_KEYSTORE_PASSWORD}"
            echo "keyPassword=${ANDROID_KEY_PASSWORD}"
            echo "keyAlias=${ANDROID_KEY_ALIAS}"
          } > android/key.properties

      - name: Set DanDanPlay dart defines
        run: |
          if [ -n "$DANDANPLAY_APP_ID" ] && [ -n "$DANDANPLAY_APP_SECRET" ]; then
            echo "DANDANPLAY_DART_DEFINE_ARG=--dart-define=DANDANPLAY_APP_ID=$DANDANPLAY_APP_ID --dart-define=DANDANPLAY_APP_SECRET=$DANDANPLAY_APP_SECRET" >> "$GITHUB_ENV"
          else
            echo "DANDANPLAY_APP_ID or DANDANPLAY_APP_SECRET is not set. Building without DanDanPlay official API credentials."
          fi

      - name: Build APKs
        run: flutter build apk --release --split-per-abi $DANDANPLAY_DART_DEFINE_ARG

      - name: Collect APK artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/fldanplay-${TAG}-android-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk dist/fldanplay-${TAG}-android-x86_64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/fldanplay-${TAG}-android-armeabi-v7a.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: dist/*.apk

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Flutter for Linux
        run: flutter build linux $DANDANPLAY_DART_DEFINE_ARG

      - name: Package linux build output
        run: bash .github/scripts/package-linux.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux
          path: |
            fldanplay-*.tar.gz
            fldanplay-*.deb

  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve tag
        shell: pwsh
        run: ./.github/scripts/resolve-tag.ps1

      - name: Set up Flutter (${{ env.FLUTTER_VERSION }})
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Add fastforge and Inno Setup
        run: |
          dart pub global activate fastforge
          choco install innosetup -y

      - name: Enable Windows desktop
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Pub get
        shell: pwsh
        run: flutter pub get

      - name: Build Windows
        shell: pwsh
        run: |
          $dartDefines = @()
          if ($env:DANDANPLAY_APP_ID -and $env:DANDANPLAY_APP_SECRET) {
            $dartDefines += "--dart-define=DANDANPLAY_APP_ID=$env:DANDANPLAY_APP_ID"
            $dartDefines += "--dart-define=DANDANPLAY_APP_SECRET=$env:DANDANPLAY_APP_SECRET"
          }
          flutter build windows --release @dartDefines

      - name: Zip Windows build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $src = Join-Path build windows\x64\runner\Release
          $zip = Join-Path release ("fldanplay-$env:TAG-windows-x64-portable.zip")
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force

      - name: Build Windows Setup
        shell: pwsh
        run: |
          fastforge package --platform windows --targets exe --skip-clean
          mv dist/**/*.exe release/fldanplay-$env:TAG-windows-x64-setup.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows
          path: |
            release/*.zip
            release/*.exe
          if-no-files-found: warn
