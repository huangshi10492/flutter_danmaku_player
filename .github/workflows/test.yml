name: Test builds

on:
  workflow_dispatch:

env:
  JAVA_VERSION: "21"
  FLUTTER_VERSION: "3.41.4"

jobs:
  android-linux:
    name: Build Android and Linux
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get tag
        run: |
          LTAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.1")
          echo "TAG=$LTAG" >> $GITHUB_ENV
          echo "Latest tag: $TAG"

      - name: Install Linux desktop deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev rpm patchelf libmpv-dev

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          distribution: jetbrains
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter (${{ env.FLUTTER_VERSION }})
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Download Android keystore
        id: android_keystore
        uses: timheuer/base64-to-file@v1.2
        with:
          fileName: keystore.jks
          encodedString: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Create key.properties
        env: 
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "storeFile=${{ steps.android_keystore.outputs.filePath }}" > android/key.properties
          echo "storePassword=${{ env.ANDROID_KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ env.ANDROID_KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ env.ANDROID_KEY_ALIAS }}" >> android/key.properties

      - name: Build APKs
        run: |
          flutter build apk --release --split-per-abi

      - name: Collect APK artifacts
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk dist/fldanplay-${TAG}-android-arm64-v8a.apk
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk   dist/fldanplay-${TAG}-android-x86_64.apk
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/fldanplay-${TAG}-android-armeabi-v7a.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: android-apk
          path: dist/*.apk

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Build Flutter for Linux
        run: flutter build linux

      - name: Package linux build output
        run: |
          # Tarball package
          tar -zcvf fldanplay-${TAG}-linux-amd64.tar.gz -C build/linux/x64/release/bundle .

          # Debian package
          mkdir fldanplay-${TAG}-linux-amd64
          cd fldanplay-${TAG}-linux-amd64
          mkdir -p opt/fldanplay
          mkdir -p usr/share/applications
          mkdir -p usr/share/icons/hicolor/512x512/apps
          cp -r ../build/linux/x64/release/bundle/* opt/fldanplay
          cp -r ../assets/linux/DEBIAN .
          chmod 0755 DEBIAN/postinst
          chmod 0755 DEBIAN/postrm
          SIZE_KB=$(du -s -b --apparent-size . | awk '{print int($1)}')
          SIZE_KB=$(($SIZE_KB - $(du -s -b --apparent-size DEBIAN | awk '{print int($1)}')))
          SIZE_KB=$(echo $SIZE_KB | awk '{print int($1/1024 + 0.999)}')
          VERSION="${TAG#v}-1"

          cat > DEBIAN/control <<EOF
          Maintainer: huangshi10492
          Package: fldanplay
          Version: ${VERSION}
          Section: x11
          Priority: optional
          Architecture: amd64
          Essential: no
          Installed-Size: ${SIZE_KB}
          Description: fldanplay
          Homepage: https://github.com/huangshi10492/flutter_danmaku_player
          Depends: libmpv2
          EOF

          cp ../assets/linux/com.huangshi10492.fldanplay.desktop usr/share/applications/com.huangshi10492.fldanplay.desktop
          cp ../assets/images/logo_round.png usr/share/icons/hicolor/512x512/apps/fldanplay.png

          cd ..
          dpkg-deb --build --root-owner-group fldanplay-${TAG}-linux-amd64
        shell: bash

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux
          path: |
            fldanplay-*.tar.gz
            fldanplay-*.deb

  windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get tag
        shell: pwsh
        run: |
          $ltag = git describe --tags --abbrev=0 2>$null
          echo "tag=$ltag" >> $env:GITHUB_ENV
          echo "Latest tag: $ltag"

      - name: Set up Flutter (${{ env.FLUTTER_VERSION }})
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Add fastforge and Inno Setup
        run: |
          dart pub global activate fastforge
          choco install innosetup

      - name: Enable Windows desktop
        shell: pwsh
        run: flutter config --enable-windows-desktop

      - name: Pub get
        shell: pwsh
        run: flutter pub get

      - name: Build Windows
        shell: pwsh
        run: flutter build windows --release

      - name: Zip Windows build
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release | Out-Null
          $src = Join-Path build windows\x64\runner\Release
          $zip = Join-Path release ("fldanplay-$env:tag-windows-x64-portable.zip")
          Compress-Archive -Path "$src\*" -DestinationPath $zip -Force

      - name: Build Windows Setup
        run: |
          fastforge package --platform windows --targets exe --skip-clean
          mv dist/**/*.exe release/fldanplay-$env:tag-windows-x64-setup.exe

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows
          path: |
            release/*.zip
            release/*.exe
          if-no-files-found: warn

